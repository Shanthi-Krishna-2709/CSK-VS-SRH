<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSK</title>
    <link
      rel="shortcut icon"
      href="https://www.bing.com/th/id/OIP.-GYwwIaD7RUw3Cw0UojdTAHaEK?w=193&h=135&c=8&rs=1&qlt=90&o=6&dpr=1.3&pid=3.1&rm=2"
      type="image/x-icon"
    />
    <style>
      body {
        background: linear-gradient(to right, rgb(251, 255, 0), #d70e07);
        background-attachment: fixed;
        width: 100%;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      h1 {
        font-size: clamp(20px, 5vw, 40px);
        color: blue;
        text-align: center;
        padding: 0 10px;
      }

      h3 {
        font-size: clamp(22px, 4vw, 50px);
        font-family: "Bebas Neue", sans-serif;
        font-weight: bold;
        text-align: center;
        color: black;
      }
      h4 {
        font-size: clamp(18px, 3.5vw, 40px);
        font-family: "Bebas Neue", sans-serif;
        font-weight: bold;
        text-align: center;
        color: ghostwhite;
      }
      h5 {
        font-size: clamp(18px, 3.5vw, 40px);
        font-family: "Bebas Neue", sans-serif;
        font-weight: bold;
        text-align: center;
        color: ghostwhite;
      }

      .players {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        width: 100%;
        position: relative;
      }

      .img1,
      .img2 {
        width: 30%;
        height: auto;
        max-height: 400px;
        object-fit: contain;
        position: static;
      }

      .img3 {
        width: 35%;
        height: auto;
        max-height: 350px;
        object-fit: contain;
        position: static;
      }

      .img4 {
        display: block;
        margin: auto;
        max-width: 100%;
        height: auto;
      }

      /* Tablet */
      @media (max-width: 900px) {
        .img1,
        .img2 {
          width: 40%;
        }
        .img3 {
          width: 55%;
        }
      }

      /* Mobile */
      @media (max-width: 600px) {
        .players {
          flex-direction: column;
          align-items: center;
        }
        .img1,
        .img2,
        .img3 {
          width: 85%;
          max-height: 250px;
        }
      }

      .poll {
        width: 90%;
        max-width: 360px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center">
      CHENNAI SUPER KINGS 🆚
      <strong style="color: black">SUNRISES HYDERABAD</strong>
    </h1>
    <div class="players">
      <img src="images/image.png" alt="csk" class="img1" />
      <img src="images/match.png" alt="" class="img3" />
      <img src="images/srh.png" alt="kkr" class="img2" />
    </div>
    <h3>MATCH PREDICTION</h3>
    <img src="images/prediction.jpeg" alt="" class="img4" />
    <h4>TODAY,APRIL 18th ,2026</h4>
    <h3>7:30PM</h3>
    <h5>VENUE: RAJIV GANDHI INTERNATIONAL STADIUM,HYDERABAD</h5>
    <h3>
      Stay tuned for the clash of titans 🔥 SRH 🆚 CSK — who will dominate
      tonight? Drop your predictions below! 🏏⚡
    </h3>

    <style>
      .poll {
        width: 300px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
      }
      button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        border: 0;
        border-radius: 10px;
        background-color: rgb(235, 221, 16);
      }
      p {
        height: 25px;
        background: #444;
        border-radius: 20px;
        overflow: hidden;
      }
      span {
        display: block;
        height: 100%;
        color: #000;
        font-weight: bold;
      }
      #c {
        background: gold;
      }
      #s {
        background: orange;
      }
    </style>
    <div class="poll">
      <h2>🏏 Poll</h2>
      <button onclick="v(1)">💛 CSK</button>
      <button onclick="v(2)">🧡 SRH</button>
      <p><span id="c">0%</span></p>
      <p><span id="s">0%</span></p>
    </div>
    <script>
      a = b = 0;
      function v(x) {
        x == 1 ? a++ : b++;
        t = a + b;
        c.style.width = (a / t) * 100 + "%";
        s.style.width = (b / t) * 100 + "%";
        c.innerHTML = Math.round((a / t) * 100) + "%";
        s.innerHTML = Math.round((b / t) * 100) + "%";
      }
    </script>
  </body>
</html>
